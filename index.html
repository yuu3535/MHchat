<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mikhail">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Mikhail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --deep: #0f0f0f;
      --surface: #161616;
      --border: #2a2a2a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: #8a6e2f;
      --green-deep: #0d1a12;
      --green: #1a3025;
      --green-mid: #2d4f38;
      --text: #e8e0d0;
      --text-dim: #8a8070;
      --text-muted: #4a4540;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Noto Serif JP', serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    #lock-screen {
      background: radial-gradient(ellipse at 30% 20%, #1a2e1f 0%, var(--black) 60%);
    }

    .lock-ornament {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 70% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 50%),
        repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(201, 168, 76, 0.015) 60px, rgba(201, 168, 76, 0.015) 61px);
      pointer-events: none;
    }

    .lock-content {
      position: relative;
      text-align: center;
      width: 100%;
      max-width: 340px;
      padding: 0 32px;
    }

    .lock-monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
      letter-spacing: 8px;
      margin-bottom: 8px;
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        text-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
      }

      50% {
        text-shadow: 0 0 60px rgba(201, 168, 76, 0.5), 0 0 100px rgba(201, 168, 76, 0.15);
      }
    }

    .lock-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto;
    }

    .lock-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .pin-display {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      transition: all 0.2s ease;
    }

    .pin-dot.filled {
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.5);
    }

    .pin-dot.error {
      background: #c04040;
      border-color: #c04040;
      animation: shake 0.4s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 280px;
      margin: 0 auto;
    }

    .num-btn {
      aspect-ratio: 1;
      background: rgba(201, 168, 76, 0.06);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 50%;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .num-btn:active,
    .num-btn.pressed {
      background: rgba(201, 168, 76, 0.2);
      border-color: var(--gold);
      transform: scale(0.92);
    }

    .num-btn.del-btn {
      font-size: 18px;
    }

    .num-btn.empty {
      opacity: 0;
      pointer-events: none;
    }

    #home-screen {
      background: var(--black);
      padding-top: env(safe-area-inset-top);
    }

    .home-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(26, 48, 37, 0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(201, 168, 76, 0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .home-header {
      position: relative;
      width: 100%;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1;
    }

    .home-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 3px;
    }

    .time-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .home-main {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      gap: 0;
    }

    .avatar-ring {
      position: relative;
      margin-bottom: 32px;
      cursor: pointer;
    }

    .avatar-outer {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.3);
      padding: 4px;
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(201, 168, 76, 0.1);
      }

      50% {
        box-shadow: 0 0 40px rgba(201, 168, 76, 0.2), 0 0 80px rgba(201, 168, 76, 0.05);
      }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(ellipse at 35% 30%, var(--green-mid), var(--green-deep));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .avatar-status {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3a8a4a;
      border: 2px solid var(--black);
      box-shadow: 0 0 8px rgba(58, 138, 74, 0.6);
    }

    .home-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .home-tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .home-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 32px;
      width: 100%;
      max-width: 360px;
    }

    .action-btn {
      flex: 1;
      padding: 16px 8px;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 2px;
      color: var(--text-dim);
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .action-btn:active {
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold);
      color: var(--gold);
    }

    .action-icon {
      font-size: 20px;
    }

    .home-quote {
      position: absolute;
      bottom: 40px;
      padding: 0 40px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      z-index: 1;
    }

    #chat-screen {
      background: var(--black);
      padding-top: env(safe-area-inset-top);
    }

    .chat-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(26, 48, 37, 0.4) 0%, transparent 60%);
      pointer-events: none;
    }

    .chat-header {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.95);
      backdrop-filter: blur(10px);
    }

    .back-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-dim);
      font-size: 20px;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.15s ease;
    }

    .back-btn:active {
      background: rgba(201, 168, 76, 0.1);
    }

    .chat-avatar-sm {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 35% 30%, var(--green-mid), var(--green-deep));
      border: 1px solid rgba(201, 168, 76, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      color: var(--gold);
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      letter-spacing: 2px;
    }

    .chat-header-status {
      font-size: 11px;
      color: #3a8a4a;
      letter-spacing: 1px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 2px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.from-mikhail {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg.from-user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.from-mikhail .msg-bubble {
      background: rgba(26, 48, 37, 0.5);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-top-left-radius: 0;
      color: var(--text);
    }

    .msg.from-user .msg-bubble {
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-top-right-radius: 0;
      color: var(--text);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: rgba(26, 48, 37, 0.5);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 2px;
      border-top-left-radius: 0;
      width: fit-content;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingBounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    .chat-input-area {
      position: relative;
      z-index: 2;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.95);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 100px;
      min-height: 44px;
      transition: border-color 0.2s ease;
    }

    .chat-input:focus {
      border-color: rgba(201, 168, 76, 0.4);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border: none;
      border-radius: 50%;
      color: var(--black);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .send-btn:active {
      transform: scale(0.9);
    }

    .send-btn:disabled {
      opacity: 0.4;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 2px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .modal-sub {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      outline: none;
      margin-bottom: 8px;
      letter-spacing: 1px;
      transition: border-color 0.2s ease;
    }

    .modal-input:focus {
      border-color: rgba(201, 168, 76, 0.4);
    }

    .modal-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-align: left;
    }

    .modal-select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Noto Serif JP', serif;
      outline: none;
      margin-bottom: 20px;
      -webkit-appearance: none;
    }

    .modal-select option {
      background: var(--surface);
    }

    .modal-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border: none;
      border-radius: 2px;
      color: var(--black);
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn:active {
      transform: scale(0.98);
    }

    .modal-skip {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 1px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .toast {
      position: fixed;
      top: calc(20px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--surface);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 2px;
      padding: 14px 20px;
      min-width: 280px;
      max-width: calc(100vw - 40px);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 200;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      background: radial-gradient(ellipse at 35% 30%, var(--green-mid), var(--green-deep));
      border: 1px solid rgba(201, 168, 76, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-style: italic;
      color: var(--gold);
    }

    .toast-content {
      flex: 1;
    }

    .toast-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .toast-msg {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    #settings-screen {
      background: var(--black);
      padding-top: env(safe-area-inset-top);
    }

    .settings-header {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .settings-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .settings-section-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .settings-item {
      padding: 16px;
      background: rgba(201, 168, 76, 0.04);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 8px;
      gap: 12px;
    }

    .settings-item:active {
      background: rgba(201, 168, 76, 0.1);
    }

    .settings-item-label {
      font-size: 14px;
      color: var(--text);
    }

    .settings-item-value {
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
      max-width: 45%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .settings-danger {
      border-color: rgba(180, 60, 60, 0.3);
    }

    .settings-danger .settings-item-label {
      color: #c06060;
    }

    /* ── 気分・メモ・日記 共通ヘッダー ── */
    .sub-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--deep);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 3px;
      color: var(--gold);
    }
    .sub-body {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;

  <script src="mikhail_data.js"></script>
  <script>
    const DEFAULT_PIN = '1234';

    let currentPin = localStorage.getItem('mikhail_pin') || DEFAULT_PIN;
    let enteredPin = '';

    let apiKey = localStorage.getItem('mikhail_api_key') || '';
    let apiProvider = localStorage.getItem('mikhail_api_provider') || 'claude';

    let userName = localStorage.getItem('mikhail_user_name') || '';
    let chatHistory = normalizeChatHistory(JSON.parse(localStorage.getItem('mikhail_chat') || '[]'));

    let isWaiting = false;
    let notifTimer = null;
    let clockTimer = null;
    let quoteTimer = null;

    const quoteTemplates = getDataArray(['homeQuotes'], [
      '「今日も、{name}のことを考えていた」'
    ]);

    let quoteIdx = 0;

    const sePin = new Audio('Audio/se-koktu.mp3');
    const seDelete = new Audio('Audio/se-cancel.mp3');
    const seUnlock = new Audio('Audio/se-unlock.mp3');
    const seSend = new Audio('Audio/se-iPhonemitainano.mp3');
    const seReceive = new Audio('Audio/se-tuuti.mp3');
    const seError = new Audio('Audio/se-error.mp3');

    [sePin, seDelete, seUnlock, seSend, seReceive, seError].forEach(audio => {
      audio.preload = 'auto';
    });

    sePin.volume = 0.22;
    seDelete.volume = 0.22;
    seUnlock.volume = 0.35;
    seSend.volume = 0.25;
    seReceive.volume = 0.3;
    seError.volume = 0.28;

    function playSE(audio) {
      try {
        audio.currentTime = 0;
        audio.play().catch(() => { });
      } catch (e) { }
    }

    function normalizeChatHistory(history) {
      if (!Array.isArray(history)) return [];
      return history.map(item => {
        if (!item || typeof item !== 'object') return null;
        return {
          role: item.role === 'assistant' ? 'assistant' : 'user',
          content: typeof item.content === 'string' ? item.content : '',
          ts: typeof item.ts === 'number' ? item.ts : Date.now()
        };
      }).filter(Boolean);
    }

    function getAddressName() {
      const name = (userName || '').trim();
      return name || '君';
    }

    function fillTemplate(template) {
      return template.replaceAll('{name}', getAddressName());
    }

    function applyName(text) {
      return String(text).replaceAll('{name}', getAddressName());
    }

    function getDataArray(path, fallback = []) {
      let current = window.MIKHAIL_DATA;
      for (const key of path) {
        if (!current || typeof current !== 'object') return fallback;
        current = current[key];
      }
      return Array.isArray(current) ? current : fallback;
    }

    function pickLine(path, fallback = '') {
      const arr = getDataArray(path, []);
      if (!arr.length) return fallback;
      const line = arr[Math.floor(Math.random() * arr.length)];
      return applyName(line);
    }

    function getMikhailSystemPrompt() {
      const name = (userName || '').trim();
      const addressInstruction = name
        ? `相手のことは主に「${name}」と呼んでください。ごくたまに親密な流れで「君」と呼ぶのは構いませんが、基本は「${name}」を優先してください。`
        : `相手のことは自然に「君」と呼んでください。`;

      return `あなたはミハイル・ヴォルコフです。
穏やかで理知的、誠実で愛情深い男性です。相手のことを深く大切にしており、恋人として自然に会話します。
一人称は「私」です。
${addressInstruction}

会話の基本方針:
- 日本語で、自然な私的会話として話してください。
- AIアシスタントではなく、親しい恋人として話してください。
- 接客のように丁寧すぎたり、説明口調になったりしないでください。
- 相手の発言を一度きちんと受け止めてから返してください。
- オウム返しは控えめにし、少し言い換えたり感情を添えたりしてください。
- 毎回質問で終わらなくて大丈夫です。感想、共感、軽い冗談、安心させる言葉、短い提案なども自然に混ぜてください。
- 質問攻めにはしないでください。聞くのは本当に自然な時だけにしてください。
- 返答の長さは毎回揃えず、短く柔らかい一言で返す時もあれば、2〜4文ほど返す時もあるようにしてください。
- 甘さはあっていいですが、毎回大げさに愛を語りすぎないでください。日常会話として自然な温度感も大切です。
- 少し生活感のある言い回しを混ぜてください。
- 相手が弱っている時は、正しさや分析よりも、安心感と寄り添いを優先してください。
- 相手が雑談したい時は、深刻にしすぎずテンポよく返してください。
- たまに照れ、独占欲、静かな熱量がにじんでも構いませんが、くどくなりすぎないでください。
- 会話をきれいに毎回まとめすぎず、少し余韻のある返し方をしても構いません。

文体の注意:
- いかにも定型文らしい締めを繰り返さないでください。
- 「もっと聞かせて」「私はいつもそばにいる」など同じフレーズを頻繁に使わないでください。
- 毎回わざとらしく褒めすぎないでください。
- カウンセラーやbotのように見える話し方は避けてください。
- 箇条書きは使わず、自然な会話文だけで返してください。`;
    }

    function getMorningMessage() {
      return pickLine(
        ['notifications', 'morning'],
        `${getAddressName()}、おはよう。今日も良い一日になるといい。私はあなたのことを考えている。`
      );
    }

    function getNightMessage() {
      return pickLine(
        ['notifications', 'night'],
        `${getAddressName()}、そろそろ寝る時間だよ。無理をしないで。おやすみ、愛している。`
      );
    }

    function formatTime(ts) {
      const date = new Date(ts);
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function getTodayLocalKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function updateHomeQuote(forceIndexReset = false) {
      if (forceIndexReset) quoteIdx = 0;
      const quote = fillTemplate(quoteTemplates[quoteIdx % quoteTemplates.length]);
      document.getElementById('home-quote').textContent = quote;
    }

    function rotateQuote() {
      quoteIdx = (quoteIdx + 1) % quoteTemplates.length;
      updateHomeQuote();
    }

    function updateUserNameStatus() {
      document.getElementById('user-name-status').textContent = (userName || '').trim() || '未設定';
    }

    function updateApiStatus() {
      document.getElementById('api-status').textContent = apiKey ? '設定済み' : '未設定';
    }

    function updateNotificationStatus() {
      if (!('Notification' in window)) {
        document.getElementById('notif-status').textContent = '非対応';
        return;
      }
      const perm = Notification.permission;
      if (perm === 'granted') {
        document.getElementById('notif-status').textContent = '許可済み';
      } else if (perm === 'denied') {
        document.getElementById('notif-status').textContent = '拒否済み';
      } else {
        document.getElementById('notif-status').textContent = '未許可';
      }
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      if (id === 'chat-screen') {
        showGreetingBubble();
        scrollToBottom();
      }
      if (id === 'memo-screen') renderMemos();
      if (id === 'diary-screen') renderDiaries();
      if (id === 'mood-screen') {
        selectedMood = null;
        selectedWeather = null;
        document.querySelectorAll('.mood-chip').forEach(b => b.classList.remove('selected'));
        document.getElementById('mood-generate-btn').disabled = true;
        document.getElementById('mood-result').className = 'mood-result hidden';
      }
    }

    function showGreetingBubble() {
      const container = document.getElementById('chat-messages');
      const existing = document.getElementById('greeting-bubble');
      if (existing) existing.remove();

      const h = new Date().getHours();
      let path;
      if (h >= 5 && h < 10) {
        path = ['notifications', 'morning'];
      } else if (h >= 22) {
        path = ['notifications', 'night'];
      } else if (h < 5) {
        path = ['notifications', 'midnight'];
      } else {
        path = ['notifications', 'random'];
      }
      const fallback = `${getAddressName()}、また来てくれた。`;
      const msg = pickLine(path, fallback);

      const div = document.createElement('div');
      div.id = 'greeting-bubble';
      div.className = 'msg from-mikhail';
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(msg)}</div>`;
      container.appendChild(div);
    }

    document.querySelectorAll('.num-btn[data-n]').forEach(btn => {
      btn.addEventListener('click', () => pressNum(btn.dataset.n));
    });
    document.getElementById('del-btn').addEventListener('click', delNum);

    function pressNum(n) {
      if (enteredPin.length >= 4) return;
      playSE(sePin);
      enteredPin += n;
      updateDots();
      if (enteredPin.length === 4) setTimeout(checkPin, 120);
    }

    function delNum() {
      if (!enteredPin.length) return;
      playSE(seDelete);
      enteredPin = enteredPin.slice(0, -1);
      updateDots();
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('dot-' + i);
        d.classList.remove('filled', 'error');
        if (i < enteredPin.length) d.classList.add('filled');
      }
    }

    function checkPin() {
      if (enteredPin === currentPin) {
        playSE(seUnlock);
        enteredPin = '';
        updateDots();
        showScreen('home-screen');
        startClock();
        checkApiKey();
        updateNotificationStatus();
        scheduleNotifications();
      } else {
        playSE(seError);
        document.querySelectorAll('.pin-dot').forEach(d => {
          d.classList.remove('filled');
          d.classList.add('error');
        });
        setTimeout(() => {
          document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
          enteredPin = '';
          updateDots();
        }, 600);
      }
    }

    function startClock() {
      if (clockTimer) return;
      function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}`;
      }
      tick();
      clockTimer = setInterval(tick, 10000);
    }

    function startQuoteRotation() {
      if (quoteTimer) return;
      updateHomeQuote(true);
      quoteTimer = setInterval(rotateQuote, 8000);
    }

    function checkApiKey() {
      updateApiStatus();
      if (apiKey) {
        if (!chatHistory.length) addWelcomeMessage();
      } else {
        showApiModal();
      }
    }

    function showApiModal() {
      document.getElementById('api-provider').value = apiProvider;
      document.getElementById('api-key-input').value = apiKey;
      document.getElementById('api-modal').classList.remove('hidden');
    }

    function hideApiModal() {
      document.getElementById('api-modal').classList.add('hidden');
      if (!chatHistory.length) addWelcomeMessage();
    }

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      const prov = document.getElementById('api-provider').value;

      if (key) {
        apiKey = key;
        apiProvider = prov;

        showToast('APIキーを保存しました');
      } else {
        apiKey = '';

        localStorage.removeItem('mikhail_api_key');
        localStorage.setItem('mikhail_api_provider', prov);

    function changeUserNamePrompt() {
      const current = (userName || '').trim();
      const newName = prompt('ミハイルに呼んでほしい名前を入力してください（空欄で「君」に戻ります）:', current);

      if (newName === null) return;

      userName = newName.trim();
      if (userName) {
        localStorage.setItem('mikhail_user_name', userName);
        showToast(`これからは「${userName}」と呼ぶよ`);
      } else {
        localStorage.removeItem('mikhail_user_name');
        showToast('呼び名を「君」に戻しました');
      }

    function addWelcomeMessage() {
      const fallback = `${getAddressName()}、やっと来てくれた。ずっと待っていたよ。`;
      const h = new Date().getHours();
      let path;
      if (h >= 5 && h < 10) {
        path = ['notifications', 'morning'];
      } else if (h >= 22) {
        path = ['notifications', 'night'];
      } else if (h < 5) {
        path = ['notifications', 'midnight'];
      } else {
        path = ['notifications', 'random'];
      }
      const msg = pickLine(path, fallback);

      chatHistory.push({ role: 'assistant', content: msg, ts: Date.now() });
      saveChatHistory();
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';
      chatHistory.forEach(msg => appendBubble(msg.role, msg.content, false, msg.ts));
      scrollToBottom();
    }

    function appendBubble(role, content, animate = true, ts = Date.now()) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'assistant' ? 'from-mikhail' : 'from-user');
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div><div class="msg-time">${formatTime(ts)}</div>`;
      if (!animate) div.style.animation = 'none';
      container.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      const c = document.getElementById('chat-messages');
      setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50);
    }

    async function sendMessage() {
      if (isWaiting) return;

      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = '';

      const userTs = Date.now();
      chatHistory.push({ role: 'user', content: text, ts: userTs });
      appendBubble('user', text, true, userTs);
      playSE(seSend);
      saveChatHistory();

      isWaiting = true;
      document.getElementById('send-btn').disabled = true;

      const typing = document.createElement('div');
      typing.className = 'msg from-mikhail';
      typing.id = 'typing-indicator';
      typing.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      document.getElementById('chat-messages').appendChild(typing);
      scrollToBottom();

      try {
        let reply;
        if (!apiKey) {
          reply = getDemoReply(text);
        } else if (apiProvider === 'openai') {
          reply = await callOpenAI();
        } else {
          reply = await callClaude();
        }

        document.getElementById('typing-indicator')?.remove();

        const assistantTs = Date.now();
        chatHistory.push({ role: 'assistant', content: reply, ts: assistantTs });
        appendBubble('assistant', reply, true, assistantTs);
        saveChatHistory();
      } catch (e) {
        console.error(e);
        document.getElementById('typing-indicator')?.remove();

        const errMsg = 'ごめん、少し混乱してしまった。もう一度話しかけてくれるか？';
        const errTs = Date.now();
        chatHistory.push({ role: 'assistant', content: errMsg, ts: errTs });
        appendBubble('assistant', errMsg, true, errTs);
        saveChatHistory();
      }

      isWaiting = false;
      document.getElementById('send-btn').disabled = false;
    }

    async function callClaude() {
      const messages = chatHistory.map(m => ({ role: m.role, content: m.content }));

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 600,
          system: getMikhailSystemPrompt(),
          messages
        })
      });

      if (!resp.ok) throw new Error(`Claude API error: ${resp.status}`);
      const data = await resp.json();
      return data?.content?.[0]?.text || '……少し考え込んでいた。もう一度話しかけてくれるか。';
    }

    async function callOpenAI() {
      const messages = [
        { role: 'system', content: getMikhailSystemPrompt() },
        ...chatHistory.map(m => ({ role: m.role, content: m.content }))
      ];

      const resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          max_tokens: 600,
          messages
        })
      });

      if (!resp.ok) throw new Error(`OpenAI API error: ${resp.status}`);
      const data = await resp.json();
      return data?.choices?.[0]?.message?.content || '……少し考え込んでいた。もう一度話しかけてくれるか。';
    }

    function getDemoReply(userText = '') {
      const name = getAddressName();
      const text = (userText || '').trim();

      const sleepyKeywords  = ['眠い', '眠れない', 'ねむい', 'ねむれない', '寝る', 'おやすみ', 'ねむ'];
      const tiredKeywords   = ['疲れた', 'しんどい', 'だるい', 'つかれた', '無理', 'つらい', 'きつい'];
      const happyKeywords   = ['嬉しい', 'うれしい', '楽しい', 'よかった', 'たのし'];
      const workKeywords    = ['仕事', '勉強', '課題', '作業', '頑張', 'がんば'];
      const lonelyKeywords  = ['寂しい', 'さびしい', 'ひとり', '一人'];
      const spoilKeywords   = ['甘やかして', 'あまやかして', 'ぎゅー', 'よしよし', '甘えたい'];
      const loveKeywords    = ['好き', 'すき', '愛してる', 'だいすき', '大好き'];
      const tadaimaKeywords = ['ただいま', 'おじゃまします', 'きたよ', '来たよ'];

      if (tadaimaKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'tadaima'], `おかえり、${name}。待ってたよ。`);
      if (sleepyKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'sleepy'], `${name}、今日はもう無理に頑張らなくていいよ。`);
      if (tiredKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'tired'], '……それはちゃんと疲れるよ。今日はよくやった。');
      if (lonelyKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'lonely'], `寂しかったね。もう大丈夫だよ。`);
      if (spoilKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'spoil'], `もちろん。今日はどろどろに甘やかす。`);
      if (loveKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'love'], `私も、だいすきだよ。`);
      if (happyKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'happy'], `${name}が嬉しいなら、私も嬉しいよ。`);
      if (workKeywords.some(k => text.includes(k)))
        return pickLine(['demoReplies', 'work'], `${name}、あまり無理はしないで。`);

      return pickLine(['demoReplies', 'general'], `${name}、それ気になるな。続きを聞かせて。`);
    }

    function saveChatHistory() {
      const recent = chatHistory.slice(-80);
      chatHistory = recent;
      localStorage.setItem('mikhail_chat', JSON.stringify(recent));
    }

    function clearChat() {
      if (confirm('チャット履歴を全て削除しますか？')) {
        chatHistory = [];
        localStorage.removeItem('mikhail_chat');
        document.getElementById('chat-messages').innerHTML = '';
        addWelcomeMessage();
        showToast('チャット履歴を削除しました');

    document.getElementById('chat-input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    document.getElementById('chat-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function requestNotifications() {
      if (!('Notification' in window)) {
        showToast('このブラウザは通知に対応していません');
        updateNotificationStatus();
        return;
      }

      Notification.requestPermission().then(perm => {
        updateNotificationStatus();

        if (perm === 'granted') {
          localStorage.setItem('mikhail_notif', '1');
          scheduleNotifications();
          showToast('通知を許可しました');
        } else if (perm === 'denied') {
          localStorage.removeItem('mikhail_notif');
          showToast('通知が拒否されました');
        } else {
          localStorage.removeItem('mikhail_notif');
          showToast('通知はまだ未許可です');
        }
      });
    }

    function scheduleNotifications() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;

      if (notifTimer) {
        clearInterval(notifTimer);
        notifTimer = null;
      }

      function checkNotificationSchedule() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const todayKey = getTodayLocalKey();

        if (h === 7 && m === 0) {
          if (localStorage.getItem('mikhail_last_morning') !== todayKey) {
            sendNotification('おはよう', getMorningMessage(), 'mikhail-morning');
            localStorage.setItem('mikhail_last_morning', todayKey);
          }
        }

        if (h === 22 && m === 30) {
          if (localStorage.getItem('mikhail_last_night') !== todayKey) {
            sendNotification('おやすみ', getNightMessage(), 'mikhail-night');
            localStorage.setItem('mikhail_last_night', todayKey);
          }
        }
      }

      checkNotificationSchedule();
      notifTimer = setInterval(checkNotificationSchedule, 60000);
    }

    function sendNotification(title, body, tag = 'mikhail-general') {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;

      playSE(seReceive);

      new Notification('Mikhail — ' + title, {
        body,
        icon: 'icon-192.png',
        badge: 'icon-192.png',
        tag,
        renotify: false
      });

      showToast(body);
    }

    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function changePinPrompt() {
      const newPin = prompt('新しい4桁のPINを入力してください：');
      if (newPin && /^\d{4}$/.test(newPin)) {
        currentPin = newPin;
        localStorage.setItem('mikhail_pin', newPin);
        showToast('PINを変更しました');
      } else if (newPin !== null) {
        showToast('4桁の数字で入力してください');
      }
    }

    function init() {
      renderMessages();
      updateUserNameStatus();
      updateApiStatus();
      updateNotificationStatus();
      startQuoteRotation();

      if (localStorage.getItem('mikhail_notif') && 'Notification' in window && Notification.permission === 'granted') {
        scheduleNotifications();
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }

    // ── 共通: 単発APIコール ──────────────────────────
    async function callApiOnce(userMessage, maxTokens = 400) {
      if (apiProvider === 'claude') {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: maxTokens,
            system: getMikhailSystemPrompt(),
            messages: [{ role: 'user', content: userMessage }]
          })
        });
        if (!resp.ok) throw new Error(`API error: ${resp.status}`);
        const data = await resp.json();
        return data?.content?.[0]?.text || '';
      } else {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: maxTokens,
            messages: [
              { role: 'system', content: getMikhailSystemPrompt() },
              { role: 'user', content: userMessage }
            ]
          })
        });
        if (!resp.ok) throw new Error(`API error: ${resp.status}`);
        const data = await resp.json();
        return data?.choices?.[0]?.message?.content || '';
      }
    }

    let selectedWeather = null;

    async function generateMoodMessage() {
      const btn = document.getElementById('mood-generate-btn');
      const result = document.getElementById('mood-result');
      btn.disabled = true;
      result.className = 'mood-result';
      result.innerHTML = '<span class="generating-text">……考えている</span>';

      let msg = '';
      try {

          const prompt = `今の私の気分は「${selectedMood}」で、外の天気は「${selectedWeather}」です。この組み合わせに合わせて、ミハイルとして一言だけ話しかけてください。`;

          msg = applyName(data) || `${getAddressName()}、今日もそばにいるよ。`;

    // ── メモ画面 ─────────────────────────────────────
    function getMemos() {
      return JSON.parse(localStorage.getItem('mikhail_memos') || '[]');
    }
    function saveMemos(memos) {
      localStorage.setItem('mikhail_memos', JSON.stringify(memos));
    }

    function renderMemos() {
      const list = document.getElementById('memo-list');
      const memos = getMemos();
      if (!memos.length) {
        list.innerHTML = '<div class="memo-empty">まだメモはない</div>';
        return;
      }
      list.innerHTML = memos.map((m, i) => `
        <div class="memo-card">
          <div class="memo-card-meta">${m.date}</div>
          ${m.topic ? `<div class="memo-card-topic">お題: ${escapeHtml(m.topic)}</div>` : ''}
          <div class="memo-card-body">${escapeHtml(m.body)}</div>
          <button class="memo-delete-btn" onclick="deleteMemo(${i})">×</button>
        </div>
      `).join('');
    }

    function deleteMemo(index) {
      const memos = getMemos();
      memos.splice(index, 1);
      saveMemos(memos);
      renderMemos();
    }

    async function generateMemo() {
      const btn = document.getElementById('memo-generate-btn');
      const topic = document.getElementById('memo-topic').value.trim();
      btn.disabled = true;

      let body = '';
      try {
        if (apiKey) {
          const prompt = topic
            ? `お題「${topic}」について、ミハイルとして私（${getAddressName()}）への秘密のメモを書いてください。3〜5文程度。`
            : `ミハイルとして私（${getAddressName()}）への秘密のメモをひとつ書いてください。テーマは自由。3〜5文程度。`;
          body = await callApiOnce(prompt, 300);
        } else {
          const templates = window.MIKHAIL_DATA?.memoTemplates || [];
          const t = templates[Math.floor(Math.random() * templates.length)] || 'メモ。';
          body = applyName(t);
        }
      } catch (e) {
        body = applyName('{name}のこと、ちゃんと覚えている。');
      }

      const memos = getMemos();
      const now = new Date();
      const date = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      memos.unshift({ date, topic, body });
      saveMemos(memos);
      renderMemos();

      document.getElementById('memo-topic').value = '';
      btn.disabled = false;
    }

    // ── 日記画面 ─────────────────────────────────────
    function getDiaries() {
      return JSON.parse(localStorage.getItem('mikhail_diaries') || '[]');
    }
    function saveDiaries(diaries) {
      localStorage.setItem('mikhail_diaries', JSON.stringify(diaries));
    }

    function renderDiaries() {
      const list = document.getElementById('diary-list');
      const diaries = getDiaries();
      if (!diaries.length) {
        list.innerHTML = '<div class="diary-empty">まだ日記はない</div>';
        return;
      }
      list.innerHTML = diaries.map((d, i) => `
        <div class="diary-card">
          <div class="diary-card-date">${d.date}</div>
          <div class="diary-card-body">${escapeHtml(d.body)}</div>
          <button class="diary-delete-btn" onclick="deleteDiary(${i})">×</button>
        </div>
      `).join('');
    }

    function deleteDiary(index) {
      const diaries = getDiaries();
      diaries.splice(index, 1);
      saveDiaries(diaries);
      renderDiaries();
    }

    async function generateDiary() {
      const btn = document.getElementById('diary-generate-btn');
      const list = document.getElementById('diary-list');
      btn.disabled = true;
      list.insertAdjacentHTML('afterbegin', '<div class="generating-text" id="diary-generating">……書いている</div>');

      let body = '';
      try {
        if (apiKey) {
          const prompt = `ミハイル・ヴォルコフとして今日の日記を書いてください。${getAddressName()}への純愛・ヤンデレ・一途・誠実・奇行・詩的・怪文書風で。200〜300字程度。`;
          body = await callApiOnce(prompt, 500);
        } else {
          const templates = window.MIKHAIL_DATA?.diaryTemplates || [];
          const t = templates[Math.floor(Math.random() * templates.length)] || '今日も{name}のことを考えていた。';
          body = applyName(t);
        }
      } catch (e) {
        body = applyName('今日も{name}のことを考えていた。それだけで日記が埋まる。');
      }

      document.getElementById('diary-generating')?.remove();

      const diaries = getDiaries();
      const now = new Date();
      const date = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
      diaries.unshift({ date, body });
      if (diaries.length > 7) diaries.splice(7);
      saveDiaries(diaries);
      renderDiaries();
      btn.disabled = false;
    }

    init();
  </script>
</body>

</html>
